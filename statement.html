<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apexon Bank | Account Statement</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=700&family=Space+Grotesk:wght=500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background-color: #f4f6f8;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-bottom: 85px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark Mode Extensions */
        body.dark-theme-active {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        body.dark-theme-active header,
        body.dark-theme-active .bottom-nav {
            background-color: #1e293b;
            border-color: rgba(255, 255, 255, 0.05);
        }
        body.dark-theme-active .back-btn {
            border-color: #475569;
            color: #94a3b8;
        }
        body.dark-theme-active .filter-btn {
            background: #1e293b;
            border-color: #334155;
            color: #94a3b8;
        }
        body.dark-theme-active .filter-btn.active {
            background: #ffffff;
            color: #0f172a;
            border-color: #ffffff;
        }
        body.dark-theme-active .statement-ledger {
            background: #1e293b;
            border-color: rgba(255, 255, 255, 0.05);
        }
        body.dark-theme-active .ledger-row {
            border-bottom-color: #334155;
        }
        body.dark-theme-active .tx-title {
            color: #f1f5f9 !important;
        }
        body.dark-theme-active .tx-party {
            color: #94a3b8 !important;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .back-btn:hover { border-color: #b38728; color: #b38728; }

        .statement-container {
            padding: 20px;
            flex-grow: 1;
        }

        .summary-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #b38728;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: #0f172a;
            color: #ffffff;
            border-color: #0f172a;
        }

        .statement-ledger {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.05);
            padding: 16px;
        }

        .ledger-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .ledger-row:last-child { border-bottom: none; padding-bottom: 0; }

        .print-btn {
            background: #b38728;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(179, 135, 40, 0.2);
        }

        .print-btn:active { transform: scale(0.99); }

        /* BOTTOM NAVIGATION DOCK */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            width: 20%;
            height: 100%;
            transition: color 0.2s ease;
        }

        .nav-item.active { color: #b38728; }
        .nav-icon { margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
        .nav-icon svg { width: 20px; height: 20px; fill: currentColor; }

        /* PRINT STYLES SHEET */
        @media print {
            body { background: #ffffff; color: #000000; padding-bottom: 0; }
            header, .bottom-nav, .filter-bar, .print-btn, .back-btn { display: none !important; }
            .statement-container { padding: 0; }
            .summary-card { background: #ffffff !important; color: #000000 !important; border: 1px solid #000 !important; padding: 15px; }
            .summary-card p, .summary-card h2, .summary-card span { color: #000000 !important; }
            .statement-ledger { border: none !important; }
            .ledger-row { border-bottom: 1px solid #000000 !important; page-break-inside: avoid; }
            .ledger-row .tx-title { color: #000000 !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Apexon Bank</div>
        <a href="index.html" class="back-btn">&times; Close</a>
    </header>

    <div class="statement-container">
        
        <!-- Account Overview Card Component -->
        <div class="summary-card">
            <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 600;">E-Statement Audit Record</p>
            <h2 style="font-size: 28px; font-weight: 700; margin-top: 4px;" id="metaBalance">0.00</h2>
            
            <div style="margin-top: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
                <div>
                    <span style="color: #94a3b8; display: block;">Account Holder:</span>
                    <strong id="metaName" style="color: #ffffff;">Loading User...</strong>
                </div>
                <div>
                    <span style="color: #94a3b8; display: block;">Account Number:</span>
                    <strong id="metaAccount" style="color: #ffffff;">0000000000</strong>
                </div>
            </div>
        </div>

        <!-- Filter Segment Elements -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="applyLedgerFilter('all', this)">All Activity</button>
            <button class="filter-btn" onclick="applyLedgerFilter('credit', this)">Credits (+)</button>
            <button class="filter-btn" onclick="applyLedgerFilter('debit', this)">Debits (-)</button>
        </div>

        <!-- Ledger Node Container -->
        <div class="statement-ledger">
            <div id="statementLedgerContent">
                <!-- Executed dynamically via local database arrays -->
            </div>
        </div>

        <button class="print-btn" onclick="window.print()">Print Official Statement</button>
    </div>

    <!-- PERSISTENT APP DOCK STRUCTURE -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div>Home</div>
        </a>
        <a href="loans.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </div>
            <div>Loans</div>
        </a>
        <a href="card.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            </div>
            <div>Cards</div>
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v2h-16v-2c0-2.66 5.33-4 8-4z"/></svg>
            </div>
            <div>Profile</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </div>
            <div>Settings</div>
        </a>
    </div>

    <script>
    // Global Config Sync
    function applyGlobalSettings() {
        var config = JSON.parse(localStorage.getItem('apexon_global_config')) || { darkMode: false, hideBalance: false };
        if (config.darkMode) {
            document.body.classList.add('dark-theme-active');
        } else {
            document.body.classList.remove('dark-theme-active');
        }
    }
    applyGlobalSettings();

    var activeFilterMode = "all";

    function populateAccountStatement() {
        var currentSession = JSON.parse(localStorage.getItem('apexon_current_session'));
        if (!currentSession) {
            window.location.href = "login.html";
            return;
        }

        var users = JSON.parse(localStorage.getItem('apexon_users')) || [];
        var liveUserData = users.find(u => u.username === currentSession.username);

        if (!liveUserData) return;

        var rawFullName = liveUserData.fullName || "Valued Customer";
        var rawBalance = liveUserData.balance || "0.00";
        var rawAccountNo = liveUserData.accountNo || "Unavailable";
        var currencySign = liveUserData.currency || "$";
        
        var formattedBalance = currencySign + parseFloat(rawBalance).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.getElementById('metaName').innerText = rawFullName;
        document.getElementById('metaBalance').innerText = formattedBalance;
        document.getElementById('metaAccount').innerText = rawAccountNo;

        var targetContainer = document.getElementById('statementLedgerContent');
        var transactions = liveUserData.transactions || [];

        if (transactions.length === 0) {
            targetContainer.innerHTML = `
                <div class="ledger-row">
                    <div style="width: 100%; text-align: center; padding: 20px 0; color: #64748b;">
                        <p style="font-size: 14px; font-weight: 600;">System Provisioning Open</p>
                        <p style="font-size: 11px; color: #94a3b8; margin-top: 4px;">Initial configuration balance is verified at ${formattedBalance}</p>
                    </div>
                </div>
            `;
            return;
        }

        var rowsHtml = "";
        
        for (var i = transactions.length - 1; i >= 0; i--) {
            var tx = transactions[i];
            var txType = tx.type.toLowerCase();

            if (activeFilterMode === 'credit' && txType !== 'credit' && txType !== 'deposit') continue;
            if (activeFilterMode === 'debit' && txType !== 'debit') continue;

            var isCredit = txType === 'credit' || txType === 'deposit';
            var amtColor = isCredit ? "#166534" : "#ef4444";
            var prefix = isCredit ? "+ " : "- ";
            var formattedTxAmt = prefix + currencySign + parseFloat(tx.amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            var partyLabel = isCredit ? "From: " + (tx.sender || "External Network") : "To: " + (tx.receiver || tx.description || "Beneficiary Account");
            var fullTimestamp = tx.date + " &bull; " + (tx.time || "");

            rowsHtml += `
                <div class="ledger-row">
                    <div>
                        <p class="tx-title" style="font-size: 13px; font-weight: 700; color: #0f172a;">${tx.description || (isCredit ? "Deposit Settlement" : "Outbound Remittance")}</p>
                        <p class="tx-party" style="font-size: 11px; color: #475569; margin-top: 3px;">${partyLabel}</p>
                        <p style="font-size: 10px; color: #94a3b8; margin-top: 2px;">${fullTimestamp}</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-size: 13px; font-weight: 700; color: ${amtColor};">${formattedTxAmt}</p>
                        <span style="font-size: 10px; color: #166534; font-weight: 600; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px;">${tx.status || "Settled"}</span>
                    </div>
                </div>
            `;
        }

        if (rowsHtml === "") {
            rowsHtml = `<p style="text-align: center; color: #64748b; padding: 20px; font-size: 13px;">No transactions matching this category filter configuration.</p>`;
        }

        targetContainer.innerHTML = rowsHtml;
    }

    function applyLedgerFilter(mode, buttonElement) {
        activeFilterMode = mode;
        
        var buttons = document.getElementsByClassName('filter-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('active');
        }
        buttonElement.classList.add('active');
        
        populateAccountStatement();
    }

    // Init configuration mount
    populateAccountStatement();
    
    // Auto-update interface content array calculations every 1 second
    setInterval(populateAccountStatement, 1000);
    </script>
</body>
</html>
